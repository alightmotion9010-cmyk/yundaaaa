<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Happy Birthday</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
html{scroll-behavior:smooth}
body{overflow-x:hidden;background:#fff}
:root{--pink:#ffd6e7;--dark:#ff4f91}
section{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:30px}
#landing{background:linear-gradient(#ffd6e7,#fff0f6);position:relative}
h1{font-family:"Great Vibes",cursive;font-size:70px;color:#ff4f91}
p{max-width:650px;text-align:center;margin:15px;color:#666}
button{padding:15px 40px;border:none;border-radius:40px;background:#ff4f91;color:#fff;font-size:18px;cursor:pointer;transition:.3s}
button:hover{transform:translateY(-4px) scale(1.05);box-shadow:0 15px 35px rgba(255,79,145,.35)}
.cake{font-size:120px;animation:float 3s ease-in-out infinite}
.balloon{position:fixed;bottom:-120px;font-size:40px;animation:fly linear infinite}
.left{left:25px}.right{right:25px}
.b1{animation-duration:10s}.b2{animation-duration:14s}.b3{animation-duration:12s}
.flower{position:absolute;color:#fff;font-size:28px;animation:fall 8s linear infinite;opacity:.7}
.card{background:#fff;padding:35px;border-radius:24px;box-shadow:0 15px 35px rgba(0,0,0,.12);width:min(90%,420px)}
input{width:100%;padding:14px;border-radius:12px;border:2px solid #ffd6e7;margin:18px 0}
.hidden{display:none}
@keyframes fly{to{transform:translateY(-120vh)}}
@keyframes float{50%{transform:translateY(-12px)}}
@keyframes fall{from{transform:translateY(-40px)}to{transform:translateY(110vh) rotate(360deg)}}
</style>
</head>
<body>

<div class="balloon left b1">🎈</div>
<div class="balloon left b2" style="left:70px">🎈</div>
<div class="balloon right b3">🎈</div>
<div class="balloon right b2" style="right:70px">🎈</div>

<section id="landing">
<div class="flower" style="left:10%;animation-delay:0s">❀</div>
<div class="flower" style="left:35%;animation-delay:2s">❀</div>
<div class="flower" style="left:70%;animation-delay:4s">❀</div>
<div class="cake">🎂</div>
<h1>NAMA_ULTAH</h1>
<p>TEKS_KECIL</p>
<button onclick="showPassword()">Masuk</button>
</section>

<section id="password" class="hidden">
<div class="card">
<h2>Masukkan Password</h2>
<p>Masukkan tanggal ulang tahun.</p>
<input id="pw" placeholder="PASSWORD">
<p id="msg"></p>
<button onclick="checkPw()">Buka</button>
</div>
</section>

<script>
const PASSWORD="PASSWORD_ULTAH";
const wrong=[
"Yah, masih salah 😝",
"Coba ingat lagi tanggal spesialnya ❤️",
"Hampir benar...",
"Belum tepat, coba lagi ya!",
"Masih salah 😆"
];
function showPassword(){
document.getElementById("landing").classList.add("hidden");
document.getElementById("password").classList.remove("hidden");
}
function checkPw(){
let v=document.getElementById("pw").value;
if(v===PASSWORD){
alert("Password benar! (Part 2 akan membuka halaman utama dengan animasi.)");
}else{
document.getElementById("msg").innerText=wrong[Math.floor(Math.random()*wrong.length)];
}
}
</script>
</body>
</html>
